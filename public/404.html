<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <title>Chappy Web</title>
    <!--
      GitHub Pages SPA fallback (rafgraph/spa-github-pages).
      GitHub Pages has no server rewrites, so a direct hit / refresh on a deep
      route serves this 404. It encodes the requested path into a query string and
      redirects to the app root; index.html restores it via history.replaceState.
      pathSegmentsToKeep = 1 keeps the project base segment ('/<repo>/').
    -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
